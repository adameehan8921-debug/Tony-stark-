<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIRA 20B | JARVIS OS</title>

  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="scanline"></div>

  <header class="top-bar">
    <div class="system-status">
      <span class="pulse"></span> ONLINE
    </div>
    <div class="title-logo">
      <h1>AIRA <span class="version">20B</span></h1>
    </div>
    <div class="controls">
      <button class="mic-btn" onclick="startListening()">🎤</button>
    </div>
  </header>

  <main class="container">
    
    <section class="left-panel">
      <div class="hud-box chat-box">
        <h3 class="box-label">COMMUNICATION</h3>
        <div class="scroll-area">
          <p class="user-text"><b>USER ></b> <span id="user">...</span></p>
          <p class="bot-text"><b>AIRA ></b> <span id="bot">READY, SIR.</span></p>
        </div>
      </div>
      
      <div class="hud-box video-wrapper">
        <iframe id="video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </section>

    <section class="center-panel">
      <div class="globe-wrapper">
        <canvas id="globe"></canvas>
        <div id="map"></div>
      </div>
    </section>

    <section class="bottom-panel">
      <div class="hud-box news-box">
        <h3 class="box-label">GLOBAL INTELLIGENCE</h3>
        <div id="news" class="news-list">
          </div>
      </div>
    </section>

  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
