<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIRA 20B | JARVIS OS</title>

  <link rel="stylesheet" href="/static/style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="scanline"></div>

  <header class="top-bar">
    <div class="system-status">
      <span class="pulse"></span> SYSTEM: ONLINE
    </div>
    <div class="title-logo">
      <h1>AIRA <span class="version">20B</span></h1>
    </div>
    <div class="controls">
      <button class="mic-btn" onclick="startListening()">
        <span class="mic-icon">🎤</span>
      </button>
    </div>
  </header>

  <main class="container">

    <section class="left-panel">
      
      <div class="hud-box chat-box">
        <h3 class="box-label">COMMUNICATION LOG</h3>
        <div class="scroll-area">
          <p class="user-text"><b>USER ></b> <span id="user">Waiting for input...</span></p>
          <p class="bot-text"><b>AIRA ></b> <span id="bot">Systems ready, Sir.</span></p>
        </div>
      </div>

      <div class="hud-box news-box">
        <h3 class="box-label">GLOBAL INTELLIGENCE</h3>
        <div id="news" class="scroll-area">
          </div>
      </div>

      <div class="hud-box video-wrapper">
        <h3 class="box-label">VISUAL FEED</h3>
        <iframe id="video" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>

    </section>

    <section class="right-panel">

      <div class="hud-box globe-wrapper">
        <h3 class="box-label">WORLD VIEW</h3>
        <canvas id="globe"></canvas>
      </div>

      <div class="hud-box map-wrapper">
        <h3 class="box-label">TACTICAL TRACKER</h3>
        <div id="map"></div>
      </div>

    </section>

  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/static/script.js"></script>

</body>
</html>
